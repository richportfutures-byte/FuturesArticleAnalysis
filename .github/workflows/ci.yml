name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev


      - name: CI diagnostics (temporary)
        run: |
          node -v
          npm -v
          npm config list -l
          npm ls vitest || true
          ls node_modules/.bin || true

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
